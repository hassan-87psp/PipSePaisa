<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Panel — PipSePaisa</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f4eee2; --bg2:#fbf7ef; --glass:#fffdf8; --glass2:#f3ecdd;
  --border:#e6dcc8; --gold:#d97706; --gold-dark:#b45309; --gold-soft:rgba(217,119,6,.10);
  --green:#059669; --green-bg:rgba(5,150,105,.10); --red:#dc2626; --red-bg:rgba(220,38,38,.10);
  --text:#0f172a; --muted:#94a3b8; --text2:#475569; --shadow:0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,Segoe UI,Arial,sans-serif;color:var(--text);font-size:14px;
  background:var(--bg);position:relative;overflow-x:hidden}
/* animated gradient backdrop */
body::before{content:'';position:fixed;inset:-30%;z-index:-2;
  background:radial-gradient(40% 40% at 20% 20%,rgba(245,158,11,.10),transparent 60%),
             radial-gradient(45% 45% at 85% 15%,rgba(16,185,129,.08),transparent 60%),
             radial-gradient(50% 50% at 50% 100%,rgba(245,158,11,.07),transparent 60%);
  animation:drift 18s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(3%,-3%) scale(1.08)}}
a{color:inherit}
.inp{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:10px;font-size:14px;font-family:inherit}
.inp:focus{outline:none;border-color:var(--gold)}
textarea.inp{resize:vertical}
.btn{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0a0e1a;font-weight:700;border:none;padding:11px 18px;border-radius:10px;cursor:pointer;font-size:14px;transition:.15s}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
.card{background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:16px;padding:20px;animation:fadeUp .45s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card-title{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.muted{color:var(--muted)}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.badge.green{background:var(--green-bg);color:var(--green)}.badge.red{background:var(--red-bg);color:var(--red)}
.badge.gold{background:var(--gold-soft);color:var(--gold)}.badge.muted{background:rgba(255,255,255,.06);color:var(--muted)}
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.hidden{display:none}
.auth{width:100%;max-width:400px;background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:20px;padding:30px;animation:fadeUp .5s ease both}
.login-logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;color:#0a0e1a;font-weight:800;font-size:24px;margin:0 auto 14px}
.auth h2{text-align:center;font-size:21px}
.auth .sub{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 20px}
.auth .field{margin-bottom:12px}
.auth .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.tabs{display:flex;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:11px;padding:4px;margin-bottom:18px}
.tabs button{flex:1;background:none;border:none;color:var(--muted);padding:9px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px}
.tabs button.active{background:var(--gold);color:#0a0e1a}
.err{background:var(--red-bg);color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.ok{background:var(--green-bg);color:var(--green);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.app{display:none;min-height:100vh}
.app.show{display:flex}
.sidebar{width:248px;background:rgba(10,14,26,.6);backdrop-filter:blur(14px);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;padding:18px 12px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;color:#0a0e1a;font-weight:800;font-size:18px;flex-shrink:0}
.brand-name{font-weight:800;font-size:15px}.brand-sub{font-size:10px;color:var(--gold);letter-spacing:1px;font-weight:700}
.menu-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--muted);font-weight:500;font-size:13.5px;margin-bottom:2px;transition:.15s}
.menu-item:hover{background:var(--glass2);color:var(--text)}
.menu-item.active{background:var(--gold-soft);color:var(--gold);font-weight:700}
.menu-sep{font-size:10px;color:#54607a;letter-spacing:1px;padding:14px 12px 6px;font-weight:700}
.main{margin-left:248px;flex:1;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 26px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(7,11,21,.7);backdrop-filter:blur(10px);z-index:10}
.topbar h1{font-size:19px}.topbar .sub{font-size:12px;color:var(--muted)}
.content{padding:26px}
.page{display:none}.page.active{display:block}
.grid{display:grid;gap:16px}
.stats{grid-template-columns:repeat(4,1fr)}
.stat .n{font-size:30px;font-weight:800}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.stat .ic{width:40px;height:40px;border-radius:11px;background:var(--gold-soft);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:12px}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
.row:last-child{border-bottom:none}
.list-empty{padding:18px;text-align:center;color:var(--muted)}
.codebox{display:flex;align-items:center;gap:12px;background:var(--gold-soft);border:1px dashed var(--gold);border-radius:12px;padding:16px 18px}
.codebox .code{font-size:26px;font-weight:800;letter-spacing:3px;color:var(--gold)}
.menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer}
.del{background:var(--red-bg);color:var(--red);border:none;width:30px;height:30px;border-radius:8px;cursor:pointer;flex-shrink:0}
.switch{position:relative;width:46px;height:26px;flex-shrink:0}
.switch input{display:none}
.switch .sl{position:absolute;inset:0;background:var(--border);border-radius:20px;transition:.2s;cursor:pointer}
.switch .sl:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--gold)}
.switch input:checked + .sl:before{transform:translateX(20px)}
/* buy/sell toggle */
.bs{display:flex;gap:8px}
.bs button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,.2);color:var(--muted);font-weight:700;cursor:pointer;font-family:inherit}
.bs button.buy.on{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.bs button.sell.on{background:var(--red-bg);border-color:var(--red);color:var(--red)}
/* signal card */
.sigc{border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--glass);position:relative;overflow:hidden}
.sigc .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sigc .pair{font-weight:800;font-size:16px}
.lv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.lv .b{background:rgba(0,0,0,.22);border-radius:9px;padding:8px 10px}
.lv .b .k{font-size:10px;color:var(--muted);text-transform:uppercase}
.lv .b .v{font-weight:700;font-size:14px}
/* pricing */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.price{border:1px solid var(--border);border-radius:18px;padding:24px;background:var(--glass);position:relative;transition:.2s}
.price:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,.4)}
.price.pop{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 20px 60px rgba(245,158,11,.18)}
.price .pp{font-size:34px;font-weight:800;color:var(--gold)}
.price .pn{font-weight:700;font-size:16px}
.price ul{list-style:none;margin:14px 0;display:grid;gap:8px}
.price li{font-size:13px;color:var(--muted);display:flex;gap:8px}
.pop-badge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--gold);color:#0a0e1a;font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.seg{display:inline-flex;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:4px}
.seg button{background:none;border:none;color:var(--muted);padding:7px 16px;border-radius:7px;cursor:pointer;font-weight:600;font-size:13px}
.seg button.on{background:var(--gold);color:#0a0e1a}
@media(max-width:880px){
  .sidebar{transform:translateX(-100%);transition:.25s;z-index:50}.sidebar.open{transform:none}
  .main{margin-left:0}.menu-toggle{display:block}.stats{grid-template-columns:repeat(2,1fr)}
  .price-grid{grid-template-columns:1fr}
  .grid[style*="1.4fr"],.grid[style*="1.2fr"]{grid-template-columns:1fr!important}
}
.vip-hero{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;background:linear-gradient(120deg,rgba(245,158,11,.18),rgba(245,158,11,.04) 60%,var(--glass));border:1px solid rgba(245,158,11,.25);position:relative;overflow:hidden}
.vip-hero:before{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(245,158,11,.25),transparent 70%);pointer-events:none}
.vip-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.5px;color:#0a0e1a;background:linear-gradient(90deg,var(--gold),var(--gold-dark));padding:4px 11px;border-radius:30px;box-shadow:0 4px 14px rgba(245,158,11,.4)}
.vip-hero-actions{display:flex;gap:8px;flex-wrap:wrap}
.goal-bar{height:11px;background:rgba(255,255,255,.07);border-radius:30px;overflow:hidden}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-dark));border-radius:30px;transition:width .7s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(245,158,11,.5)}
.vip-goal{background:linear-gradient(135deg,rgba(245,158,11,.08),var(--glass));border:1px solid rgba(245,158,11,.2)}
.price .pico{font-size:34px;line-height:1;margin-bottom:6px;filter:drop-shadow(0 4px 10px rgba(245,158,11,.35))}
.price .ptag{font-size:12px;color:var(--muted);margin:-4px 0 10px}
.price.vip{background:linear-gradient(160deg,rgba(245,158,11,.16),rgba(255,255,255,.03));border:1.5px solid var(--gold);box-shadow:0 12px 40px rgba(245,158,11,.18)}
.price.vip .pp{background:linear-gradient(90deg,var(--gold),#fcd34d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.pop-badge.vipb{background:linear-gradient(90deg,var(--gold),var(--gold-dark));color:#0a0e1a}
.save-badge{display:inline-block;font-size:10px;font-weight:800;color:var(--green);background:var(--green-bg);padding:3px 9px;border-radius:20px;margin:2px 0 8px}
.bell-wrap{position:relative}
.bell{position:relative;background:var(--glass);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.bell:hover{border-color:rgba(245,158,11,.45)}
.bell-dot{position:absolute;top:7px;right:8px;width:9px;height:9px;background:var(--red);border-radius:50%;box-shadow:0 0 0 2px var(--bg)}
.bell-menu{position:absolute;right:0;top:46px;width:330px;max-height:420px;overflow:auto;background:rgba(13,19,34,.98);border:1px solid var(--border);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.5);padding:8px;display:none;z-index:300}
.bell-menu.open{display:block;animation:pipFade .2s ease}
.bell-item{display:flex;gap:10px;align-items:flex-start;padding:10px;border-radius:10px}.bell-item:hover{background:var(--glass)}
.bell-h{font-size:13px;font-weight:800;padding:6px 10px 10px;border-bottom:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}

/* ===== Custom light theme matching user website ===== */
body::before{display:none!important}
body{background:var(--bg)!important;color:var(--text)!important;font-family:'Plus Jakarta Sans',Inter,system-ui,Segoe UI,Arial,sans-serif!important}
.sidebar{background:var(--bg-sidebar,var(--bg2))!important;border-right:1px solid var(--border)!important;backdrop-filter:none!important}
.topbar{background:var(--bg-sidebar,var(--bg2))!important;border-bottom:1px solid var(--border)!important;backdrop-filter:none!important}
.card,.auth,.sigc,.price,.bell-menu{background:var(--glass)!important;border:1px solid var(--border)!important;box-shadow:var(--shadow)!important;backdrop-filter:none!important}
.menu-item{color:var(--text2,#475569)!important}.menu-item:hover{background:var(--glass2)!important;color:var(--text)!important}.menu-item.active{background:var(--gold-soft)!important;color:var(--gold)!important}
.menu-sep{color:var(--muted)!important}.muted,.topbar .sub{color:var(--muted)!important}.brand-sub{color:var(--gold)!important}
.inp,input,select,textarea{background:var(--bg-elevated,var(--glass2))!important;border:1px solid var(--border)!important;color:var(--text)!important}
input::placeholder,textarea::placeholder{color:var(--muted)!important}select option{background:#fffdf8!important;color:#0f172a!important}
.tabs,.seg{background:var(--glass2)!important;border-color:var(--border)!important}.tabs button,.seg button{color:var(--text2,#475569)!important}.tabs button.active,.seg button.on{background:var(--gold)!important;color:#0a0e1a!important}
.lv .b{background:var(--bg-elevated,var(--glass2))!important}.codebox{background:var(--gold-soft)!important}.bell{background:var(--glass)!important;border-color:var(--border)!important;color:var(--text)!important}
#mentorPerfUser .perf-hero{background:linear-gradient(135deg,rgba(217,119,6,.10),rgba(5,150,105,.06))!important;border:1px solid rgba(217,119,6,.25)!important;border-radius:18px;padding:24px 28px;margin-bottom:18px}
#mentorPerfUser .perf-kicker{font-size:13px;font-weight:800;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
#mentorPerfUser .perf-hero h2{font-size:28px;line-height:1.15;margin:0;color:var(--text)}
#mentorPerfUser .perf-hero p{font-size:14px;color:var(--muted);margin-top:6px}
#mentorPerfUser .stats-grid-user{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
#mentorPerfUser .stat-card-user{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;min-height:92px}
#mentorPerfUser .stat-card-user.good{border-color:rgba(5,150,105,.25)}#mentorPerfUser .stat-card-user.bad{border-color:rgba(220,38,38,.25)}
#mentorPerfUser .stat-label-user{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}
#mentorPerfUser .stat-value-user{font-size:28px;font-weight:800;color:var(--green)}#mentorPerfUser .stat-value-user.red{color:var(--red)}
#mentorPerfUser .three-col-user{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
#mentorPerfUser .two-col-user{display:grid;grid-template-columns:1.1fr 1fr;gap:14px}
#mentorPerfUser .perf-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:18px;min-height:205px}
#mentorPerfUser .perf-card h3{font-size:16px;margin:0 0 16px;color:var(--text)}
#mentorPerfUser .goal-row{display:flex;align-items:center;gap:10px;margin-top:34px}#mentorPerfUser .goal-row input{height:44px;flex:1;border-radius:10px;padding:0 14px;font-size:15px}#mentorPerfUser .goal-row button{height:44px;padding:0 22px;border-radius:10px;border:0;background:linear-gradient(135deg,var(--gold),var(--gold-dark));font-weight:800;color:#0a0e1a}
#mentorPerfUser .bars{height:120px;display:flex;align-items:end;gap:10px;padding:10px 4px 0;border-bottom:1px solid var(--border)}#mentorPerfUser .bar{width:22px;background:linear-gradient(180deg,#f59e0b,#d97706);border-radius:6px 6px 0 0;min-height:3px}#mentorPerfUser .bar-labels{display:flex;gap:10px;color:var(--muted);font-size:10px;margin-top:5px}
#mentorPerfUser .win-circle{width:126px;height:126px;border-radius:50%;border:14px solid #10b981;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:8px auto 12px}#mentorPerfUser .win-circle b{font-size:30px;color:#f59e0b}#mentorPerfUser .list-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}#mentorPerfUser .progress-line{height:7px;background:#e6dcc8;border-radius:20px;overflow:hidden;margin-top:6px}#mentorPerfUser .progress-line span{display:block;height:100%;background:linear-gradient(90deg,#f59e0b,#d97706);border-radius:20px}

<style id="pipPolish">
*::-webkit-scrollbar{width:10px;height:10px}*::-webkit-scrollbar-track{background:rgba(255,255,255,.03)}
*::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#f59e0b,#d97706);border-radius:10px;border:2px solid transparent;background-clip:padding-box}
*{scrollbar-color:#f59e0b transparent;scrollbar-width:thin}::selection{background:rgba(245,158,11,.32);color:#fff}
button,.btn,a{transition:transform .15s ease,box-shadow .2s ease,filter .15s ease,background .2s ease}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(245,158,11,.22)}
.card{transition:transform .2s ease,box-shadow .25s ease,border-color .2s ease}.card:hover{border-color:rgba(245,158,11,.25)}
input,select,textarea{transition:border-color .15s,box-shadow .15s}input:focus,select:focus,textarea:focus{box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.page{animation:pipFade .35s ease}@keyframes pipFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#pipToasts{position:fixed;top:18px;right:18px;z-index:99999;display:flex;flex-direction:column;gap:10px;max-width:340px}
.pip-toast{background:rgba(17,24,39,.96);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-left:4px solid #f59e0b;color:#e8eaf0;padding:13px 16px;border-radius:11px;font-size:14px;box-shadow:0 16px 40px rgba(0,0,0,.45);animation:pipToastIn .3s ease;display:flex;gap:10px;align-items:flex-start}
.pip-toast.ok{border-left-color:#10b981}.pip-toast.err{border-left-color:#ef4444}
@keyframes pipToastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}.pip-toast.out{animation:pipToastOut .3s ease forwards}@keyframes pipToastOut{to{opacity:0;transform:translateX(40px)}}
</style>
<style id="pipSplash">
#pipBoot{position:fixed;inset:0;z-index:999999;background:radial-gradient(circle at 50% 40%,#0d1322,#070b15 72%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .6s ease,visibility .6s}
#pipBoot.gone{opacity:0;visibility:hidden}
#pipBoot .bl{width:86px;height:86px;border-radius:22px;box-shadow:0 12px 44px rgba(245,158,11,.45);animation:pipBootPulse 1.4s ease-in-out infinite}
#pipBoot .bt{font-size:21px;font-weight:800;letter-spacing:.4px;color:#e8eaf0}#pipBoot .bt span{color:#f59e0b}
#pipBoot .bar{width:150px;height:4px;border-radius:30px;background:rgba(255,255,255,.08);overflow:hidden}
#pipBoot .bar i{display:block;height:100%;width:40%;background:linear-gradient(90deg,#f59e0b,#fcd34d);border-radius:30px;animation:pipBootBar 1.1s ease-in-out infinite}
@keyframes pipBootPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes pipBootBar{0%{margin-left:-40%}100%{margin-left:150%}}
</style>
</head>
<body><style id="darkfix-css">
select{color-scheme:dark}
select option,select optgroup{background:#0f1729!important;color:#e8eaf0!important}
.tick-chip{display:inline-flex;gap:7px;align-items:center;font-size:12.5px;cursor:pointer;background:linear-gradient(160deg,rgba(245,158,11,.06),rgba(255,255,255,.02));border:1px solid var(--border);padding:7px 13px;border-radius:10px;transition:.15s;font-weight:600;user-select:none}
.tick-chip:hover{border-color:var(--gold)}
.tick-chip:has(input:checked){background:linear-gradient(135deg,rgba(245,158,11,.22),rgba(245,158,11,.08));border-color:var(--gold);color:var(--gold)}
.tick-chip input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer}

async function createChart(){
  const btn=document.getElementById('chBtn');btn.disabled=true;btn.textContent='⏳ Saving...';
  try{
    const pair=document.getElementById('chPair').value;const title=document.getElementById('chTitle').value.trim();
    let image_url='';
    const file=document.getElementById('chFile').files[0];
    if(!title){alert('Title is required');btn.disabled=false;btn.textContent='📊 Publish Chart';return;}
    if(file){
      const path=ME.id+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9.]/g,'');
      const {error:upErr}=await sb.storage.from('charts').upload(path,file,{upsert:true});
      if(upErr){alert('Upload failed — create a public "charts" bucket in Supabase Storage: '+upErr.message);btn.disabled=false;btn.textContent='📊 Publish Chart';return;}
      image_url=sb.storage.from('charts').getPublicUrl(path).data.publicUrl;
    }
    const chAud=Array.prototype.slice.call(document.querySelectorAll('.ch-aud:checked')).map(function(c){return c.value;});
    if(!chAud.length)chAud.push('free');
    const {error}=await sb.from('charts').insert({owner_id:ME.id,is_official:false,pair,title,image_url,audience:chAud.join(','),notes:document.getElementById('chNotes').value.trim()||null});
    if(error){alert('Error: '+error.message);}
    else{document.getElementById('chTitle').value='';document.getElementById('chFile').value='';document.getElementById('chNotes').value='';loadCharts();}
  }catch(e){alert(e.message);}

}

async function mcUpload(input){
  const file=input.files&&input.files[0];if(!file)return;
  const prev=document.getElementById('mc-prev');if(prev)prev.innerHTML='<span class="muted" style="font-size:12px">Uploading...</span>';
  try{
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=ME.id+'/course_'+Date.now()+'.'+ext;
    const {error}=await sb.storage.from('charts').upload(path,file,{upsert:true});
    if(error){if(prev)prev.innerHTML='<span style="font-size:12px;color:var(--red)">Upload failed: '+esc(error.message)+'</span>';return;}
    const url=sb.storage.from('charts').getPublicUrl(path).data.publicUrl;
    document.getElementById('mc-thumb').value=url;
    if(prev)prev.innerHTML='<img src="'+url+'" style="width:140px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin-top:6px">';
  }catch(e){if(prev)prev.innerHTML='<span style="font-size:12px;color:var(--red)">Error: '+esc(e.message)+'</span>';}
}

function parsePlan(row){
  const lines=(row.features||'').split('\n');let icon='💎',tag='',pop=false,vip=false,period='monthly';const feats=[];
  let ib=false,iblink='',ibdep=0,ibbroker='',ibprice=0,services=[];
  lines.forEach(l=>{const t=l.trim();if(!t)return;
    if(t==='[POPULAR]')pop=true;else if(t==='[VIP]')vip=true;
    else if(t==='[IB]')ib=true;
    else if(t.indexOf('[SERVICES]')===0)services=t.slice(10).split(',').map(x=>x.trim()).filter(Boolean);
    else if(t.indexOf('[IBPRICE]')===0)ibprice=parseFloat(t.slice(9).trim())||0;
    else if(t.indexOf('[IBLINK]')===0)iblink=t.slice(8).trim();
    else if(t.indexOf('[IBDEPOSIT]')===0)ibdep=parseFloat(t.slice(11).trim())||0;
    else if(t.indexOf('[IBBROKER]')===0)ibbroker=t.slice(10).trim();
    else if(t.indexOf('[ICON]')===0)icon=t.slice(6).trim()||'💎';
    else if(t.indexOf('[TAG]')===0)tag=t.slice(5).trim();
    else if(t.indexOf('[PERIOD]')===0)period=t.slice(8).trim()||'monthly';

/* ============ ANALYTICS ============ */
async function renderAnalytics(){
  const el=document.getElementById('pg-analytics');
  el.innerHTML=`<div class="grid" style="grid-template-columns:1.3fr 1fr">
    <div class="card"><div class="card-title">📊 Signals — last 14 days</div><div id="anBars" style="margin-top:14px"><div class="list-empty">Loading...</div></div></div>
    <div class="card"><div class="card-title">🎯 Win Rate</div><div id="anWin" style="margin-top:14px;text-align:center"><div class="list-empty">Loading...</div></div></div>
  </div>`;
  const {data}=await sb.from('signals').select('created_at,status').eq('owner_id',ME.id);
  const sigs=data||[];
  // bars last 14 days
  const days=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d);}
  const counts=days.map(d=>sigs.filter(s=>new Date(s.created_at).toDateString()===d.toDateString()).length);
  const max=Math.max(1,...counts);
  document.getElementById('anBars').innerHTML='<div style="display:flex;align-items:flex-end;gap:5px;height:160px">'+counts.map((c,i)=>`<div title="${c}" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px"><div style="width:100%;background:linear-gradient(180deg,var(--gold),var(--gold-dark));border-radius:4px 4px 0 0;height:${Math.round(c/max*130)}px;min-height:3px"></div><span style="font-size:9px;color:var(--muted)">${days[i].getDate()}</span></div>`).join('')+'</div>';
  const tp=sigs.filter(s=>s.status==='tp_hit').length, sl=sigs.filter(s=>s.status==='sl_hit').length;
  const wr=(tp+sl)?Math.round(tp/(tp+sl)*100):0;
  const C=2*Math.PI*52, off=C-(wr/100)*C;
  document.getElementById('anWin').innerHTML=`<svg width="150" height="150" viewBox="0 0 130 130"><circle cx="65" cy="65" r="52" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="14"/><circle cx="65" cy="65" r="52" fill="none" stroke="var(--green)" stroke-width="14" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 65 65)"/><text x="65" y="60" text-anchor="middle" font-size="26" font-weight="800" fill="var(--text)">${wr}%</text><text x="65" y="80" text-anchor="middle" font-size="10" fill="var(--muted)">win rate</text></svg><div class="muted" style="font-size:12px;margin-top:8px">${tp} TP · ${sl} SL · ${sigs.length} total</div>`;
}

        ${m.audience?`<div style="border-top:1px solid var(--border);padding-top:11px"><div class="muted" style="font-size:11.5px;margin-bottom:7px">👁️ Send to (tick one or more)</div><div style="display:flex;flex-wrap:wrap;gap:8px"><label class="tick-chip"><input type="checkbox" class="mod-aud" value="free" checked> 🆓 Free</label><label class="tick-chip"><input type="checkbox" class="mod-aud" value="premium"> 💎 Premium</label><label class="tick-chip"><input type="checkbox" class="mod-aud" value="vip"> 👑 VIP</label></div></div>`:''}
        <button class="btn" onclick="createItem('${k}')">➕ Publish</button>
      </div></div>
    <div class="card"><div class="card-title">📋 Your ${m.label}</div><div id="list-${k}" style="margin-top:8px"><div class="list-empty">Loading...</div></div></div>
  </div>`;
  loadList(k);
}
async function loadList(k){
  const m=MODS[k];const box=document.getElementById('list-'+k);
  const {data,error}=await sb.from(m.table).select('*').eq('owner_id',ME.id).order('created_at',{ascending:false});
  if(error){box.innerHTML=`<div class="list-empty" style="color:var(--red)">${esc(error.message)}</div>`;return;}
  if(!data||!data.length){box.innerHTML='<div class="list-empty">Nothing yet.</div>';return;}
  box.innerHTML=data.map(r=>{var ab='';if(m.audience){var aud=(r.audience||'free');var parts=(aud==='all')?['free','premium','vip']:aud.split(',').map(x=>x.trim()).filter(Boolean);var lbl={free:'🆓',premium:'💎',vip:'👑'};ab=' '+parts.map(function(p){return '<span class="badge '+(p==='free'?'green':'gold')+'" style="font-size:9px">'+(lbl[p]||p)+'</span>';}).join(' ');}return `<div class="row"><div style="min-width:0">${m.row(r)}${ab}</div><button class="del" onclick="delItem('${k}','${r.id}')">🗑️</button></div>`;}).join('');
}
async function createItem(k){
  const m=MODS[k];let obj={owner_id:ME.id,is_official:false};let any=false;
  m.fields.forEach(([id,ph,t])=>{let v=document.getElementById(`f-${k}-${id}`).value.trim();if(v!==''){obj[id]=(t==='num')?parseFloat(v):v;any=true;}});
  if(!any){alert('Pehle fields bharein');return;}
  if(m.audience){var aud=Array.prototype.slice.call(document.querySelectorAll('.mod-aud:checked')).map(function(c){return c.value;});if(!aud.length)aud.push('free');obj.audience=aud.join(',');}
  if(m.transform)obj=m.transform(obj);
  const {error}=await sb.from(m.table).insert(obj);
  if(error){alert('Error: '+error.message);return;}
  m.fields.forEach(([id])=>{const e=document.getElementById(`f-${k}-${id}`);if(e)e.value='';const ff=document.getElementById(`ff-${k}-${id}`);if(ff)ff.value='';const fp=document.getElementById(`fp-${k}-${id}`);if(fp)fp.innerHTML='';});loadList(k);
}
async function delItem(k,id){if(!confirm('Delete?'))return;await sb.from(MODS[k].table).delete().eq('id',id);loadList(k);}
async function genUpload(k,id,input){
  const file=input.files&&input.files[0];if(!file)return;
  const prev=document.getElementById('fp-'+k+'-'+id);if(prev)prev.innerHTML='<span class="muted" style="font-size:12px">Uploading...</span>';
  try{
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=ME.id+'/'+k+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.'+ext;
    const {error}=await sb.storage.from('charts').upload(path,file,{upsert:true});
    if(error){if(prev)prev.innerHTML='<span style="font-size:12px;color:var(--red)">Upload failed: '+error.message+' (create a public \'charts\' bucket)</span>';return;}
    const url=sb.storage.from('charts').getPublicUrl(path).data.publicUrl;
    const hid=document.getElementById('f-'+k+'-'+id);if(hid)hid.value=url;
    if(prev)prev.innerHTML='<img src="'+url+'" style="width:120px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin-top:6px">';
  }catch(e){if(prev)prev.innerHTML='<span style="font-size:12px;color:var(--red)">Error: '+e.message+'</span>';}
}

<script>
(function(){var c=document.createElement('div');c.id='pipToasts';function mount(){if(!document.getElementById('pipToasts')&&document.body)document.body.appendChild(c);}document.addEventListener('DOMContentLoaded',mount);
function toast(msg,type){mount();var t=document.createElement('div');t.className='pip-toast'+(type?(' '+type):'');var icon=type==='ok'?'✅':type==='err'?'⚠️':'🔔';t.innerHTML='<span>'+icon+'</span><span></span>';t.lastChild.textContent=String(msg);(document.getElementById('pipToasts')||c).appendChild(t);setTimeout(function(){t.classList.add('out');setTimeout(function(){t.remove()},300)},3500);}
window.pipToast=toast;window.alert=function(m){m=String(m);var err=/error|fail|invalid|wrong|required|not found|denied/i.test(m);toast(m,err?'err':'ok');};
function animateNum(el){if(el.dataset.cu)return;var raw=(el.textContent||'').trim();var m=raw.match(/^([^0-9-]*)(-?[\d,]+\.?\d*)(.*)$/);if(!m)return;var pre=m[1],num=parseFloat(m[2].replace(/,/g,'')),suf=m[3];if(isNaN(num)||num===0)return;el.dataset.cu='1';var dur=900,t0=performance.now();function step(t){var p=Math.min(1,(t-t0)/dur);var v=Math.round(num*(0.5-Math.cos(p*Math.PI)/2));el.textContent=pre+v.toLocaleString()+suf;if(p<1)requestAnimationFrame(step);else el.textContent=pre+num.toLocaleString()+suf;}requestAnimationFrame(step);}
function scan(){document.querySelectorAll('.stat .n, .stat-value').forEach(function(el){var x=(el.textContent||'').trim();if(/\d/.test(x)&&x!=='...')animateNum(el);});}
var mo=new MutationObserver(function(){clearTimeout(window._cuT);window._cuT=setTimeout(scan,150)});document.addEventListener('DOMContentLoaded',function(){try{mo.observe(document.body,{subtree:true,childList:true,characterData:true});}catch(e){}setTimeout(scan,500)});})();
</script>
