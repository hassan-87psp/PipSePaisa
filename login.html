<!doctype html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PipSePaisa Login</title>
<link rel="icon" href="favicon.png">
<style>
:root{
  --gold:#e57d00;
  --gold-dark:#c85d00;
  --cream:#fffaf1;
  --cream-2:#f4ead7;
  --navy:#111a2d;
  --muted:#94a3bd;
  --border:#e6d6bc;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,#f4ead7,#fffdf7);
  font-family:Inter,Arial,sans-serif;
  color:var(--navy);
  padding:20px;
}
.auth-card{
  width:min(500px,100%);
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:26px;
  padding:34px;
  box-shadow:0 20px 55px rgba(31,41,55,.15);
}
.logo{
  width:72px;height:72px;display:block;margin:0 auto 18px;
  border-radius:18px;object-fit:cover;
}
h1{text-align:center;margin:0 0 8px;font-size:31px}
.subtitle{text-align:center;color:var(--muted);margin:0 0 25px;font-size:16px}
.tabs{
  display:flex;gap:4px;padding:5px;background:var(--cream-2);
  border:1px solid var(--border);border-radius:14px;margin-bottom:24px;
}
.tab{
  flex:1;border:0;background:transparent;padding:13px;border-radius:10px;
  font-size:16px;font-weight:700;color:#44506a;cursor:pointer;
}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#111}
.form{display:none}.form.active{display:block}
label{display:block;color:var(--muted);font-size:14px;margin:15px 0 8px}
input{
  width:100%;border:1px solid var(--border);border-radius:13px;
  background:#f7eedf;padding:16px;font-size:16px;color:var(--navy);outline:none;
}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(229,125,0,.12)}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:14px 0}
.remember{display:flex;align-items:center;gap:7px;color:#667085;font-size:14px}
.remember input{width:auto}
.link{color:var(--gold-dark);cursor:pointer;font-weight:700}
.primary{
  width:100%;border:0;border-radius:13px;padding:15px;margin-top:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  color:#111;font-size:16px;font-weight:800;cursor:pointer;
}
.footer{text-align:center;color:var(--muted);margin:18px 0 0;font-size:14px}
.message{display:none;padding:12px;border-radius:10px;margin-top:14px;font-size:14px}
.back{display:block;text-align:center;margin-top:18px;color:var(--gold-dark);font-weight:700;text-decoration:none}
@media(max-width:520px){.auth-card{padding:24px 20px;border-radius:20px}h1{font-size:27px}}
</style>
</head>
<body>
<section class="auth-card">
  <img class="logo" src="favicon.png" alt="PipSePaisa logo">
  <h1 id="title">Welcome Back</h1>
  <p class="subtitle" id="subtitle">Login to your trading hub</p>

  <div class="tabs">
    <button type="button" class="tab active" id="loginTab">Login</button>
    <button type="button" class="tab" id="signupTab">Sign Up</button>
  </div>

  <div class="form active" id="loginForm">
    <label for="loginEmail">Email Address</label>
    <input id="loginEmail" type="email" placeholder="your@email.com" autocomplete="email">

    <label for="loginPassword">Password</label>
    <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">

    <div class="row">
      <label class="remember"><input id="rememberMe" type="checkbox" checked> Remember me</label>
      <span class="link" id="forgotLink">Forgot password?</span>
    </div>

    <button type="button" class="primary" id="loginBtn">🔐 Login to Account</button>
    <div class="message" id="loginMessage"></div>
    <p class="footer">New here? <span class="link" id="createLink">Create free account →</span></p>
  </div>

  <div class="form" id="signupForm">
    <label for="signupName">Full Name</label>
    <input id="signupName" type="text" placeholder="Your full name">

    <label for="signupEmail">Email Address</label>
    <input id="signupEmail" type="email" placeholder="your@email.com" autocomplete="email">

    <label for="signupPhone">WhatsApp Number</label>
    <input id="signupPhone" type="tel" placeholder="+92 3XX XXXXXXX">

    <label for="signupPassword">Password</label>
    <input id="signupPassword" type="password" placeholder="Minimum 6 characters" autocomplete="new-password">

    <label for="signupPassword2">Confirm Password</label>
    <input id="signupPassword2" type="password" placeholder="Repeat password" autocomplete="new-password">

    <button type="button" class="primary" id="signupBtn">✨ Create Free Account</button>
    <div class="message" id="signupMessage"></div>
    <p class="footer">Already have an account? <span class="link" id="backLoginLink">Login →</span></p>
  </div>

  <div class="form" id="forgotForm">
    <label for="forgotEmail">Email Address</label>
    <input id="forgotEmail" type="email" placeholder="your@email.com">
    <button type="button" class="primary" id="forgotBtn">📧 Send Reset Link</button>
    <div class="message" id="forgotMessage"></div>
    <p class="footer"><span class="link" id="forgotBack">← Back to Login</span></p>
  </div>

  <a class="back" href="index.html">← Back to Home</a>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://etfolhinohgmskbfjoyh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_LgmfuH2ePiY8fxNGs7nTTA_FSS_oPBw';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginTab = document.getElementById('loginTab');
const signupTab = document.getElementById('signupTab');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
const forgotForm = document.getElementById('forgotForm');

function showTab(tab){
  loginForm.classList.toggle('active', tab==='login');
  signupForm.classList.toggle('active', tab==='signup');
  forgotForm.classList.toggle('active', tab==='forgot');
  loginTab.classList.toggle('active', tab==='login');
  signupTab.classList.toggle('active', tab==='signup');
  document.getElementById('title').textContent =
    tab==='signup' ? 'Create Account' : tab==='forgot' ? 'Reset Password' : 'Welcome Back';
  document.getElementById('subtitle').textContent =
    tab==='signup' ? 'Join PipSePaisa in a few seconds' :
    tab==='forgot' ? 'We will send you a reset link' : 'Login to your trading hub';
}
function msg(id,text,ok=false){
  const el=document.getElementById(id);
  el.style.display='block';
  el.style.background=ok?'#e9f9f2':'#fff0ef';
  el.style.color=ok?'#087f5b':'#c92a2a';
  el.textContent=text;
}
loginTab.addEventListener('click',()=>showTab('login'));
signupTab.addEventListener('click',()=>showTab('signup'));
document.getElementById('createLink').addEventListener('click',()=>showTab('signup'));
document.getElementById('backLoginLink').addEventListener('click',()=>showTab('login'));
document.getElementById('forgotLink').addEventListener('click',()=>showTab('forgot'));
document.getElementById('forgotBack').addEventListener('click',()=>showTab('login'));

document.getElementById('loginBtn').addEventListener('click',async()=>{

  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){msg('loginMessage',error.message);return;}
  try {
    const user = data && data.user;
    const result = user ? await sb.from('profiles').select('role,is_active').eq('id',user.id).maybeSingle() : null;
    const profile = result && result.data;
    if (profile && profile.is_active === false) {
      await sb.auth.signOut();
      msg('loginMessage','Your account is currently inactive. Please contact support.');
      return;
    }
    const role = profile && profile.role ? profile.role : 'user';
    window.location.href = role === 'admin' ? 'admin.html' : role === 'mentor' ? 'mentor.html' : 'user.html';
  } catch (e) {
    window.location.href='user.html';
  }
});

document.getElementById('signupBtn').addEventListener('click',async()=>{

  const full_name=document.getElementById('signupName').value.trim();
  const phone=document.getElementById('signupPhone').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  const password2=document.getElementById('signupPassword2').value;
  if(password!==password2){msg('signupMessage','Passwords do not match.');return;}
  const {error}=await sb.auth.signUp({
    email,password,
    options:{data:{full_name,phone}}
  });
  if(error){msg('signupMessage',error.message);return;}
  msg('signupMessage','Account created. Please check your email for verification.',true);
});

document.getElementById('forgotBtn').addEventListener('click',async()=>{

  const email=document.getElementById('forgotEmail').value.trim();
  const {error}=await sb.auth.resetPasswordForEmail(email,{
    redirectTo:location.origin + location.pathname.replace('login.html','index.html')
  });
  if(error){msg('forgotMessage',error.message);return;}
  msg('forgotMessage','Password reset link sent.',true);
});

if(location.hash==='#signup') showTab('signup');
</script>

<script id="psp-existing-session-route">
(async function(){
  try {
    const sessionResult = await sb.auth.getSession();
    const session = sessionResult && sessionResult.data && sessionResult.data.session;
    if (!session || !session.user) return;
    const r = await sb.from('profiles').select('role,is_active').eq('id',session.user.id).maybeSingle();
    if (r.data && r.data.is_active === false) return;
    const role = r.data && r.data.role || 'user';
    location.replace(role === 'admin' ? 'admin.html' : role === 'mentor' ? 'mentor.html' : 'user.html');
  } catch(e) {}
})();
</script>

</body>
</html>
