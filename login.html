<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | PipSePaisa</title><link rel="stylesheet" href="assets/css/app.css"></head>
<body><div class="auth-wrap"><div class="auth-card card"><a class="brand" href="index.html"><span class="brand-mark">P</span><span>PipSePaisa</span></a><div style="margin:28px 0 20px"><span class="eyebrow">Welcome back</span><h2 style="font-size:2.2rem">Login</h2></div><form id="loginForm"><div class="field"><label>Email</label><input id="loginEmail" type="email" required></div><div class="field"><label>Password</label><input id="loginPassword" type="password" required></div><button class="btn" style="width:100%">Login</button></form><button id="forgotBtn" class="btn secondary" style="width:100%;margin-top:10px">Forgot Password</button><hr style="border:0;border-top:1px solid var(--line);margin:24px 0"><span class="eyebrow">New member</span><form id="registerForm"><div class="field"><label>Full Name</label><input id="regName" required></div><div class="field"><label>Email</label><input id="regEmail" type="email" required></div><div class="field"><label>Password</label><input id="regPassword" type="password" minlength="6" required></div><div class="field"><label>Mentor / Referral Code (optional)</label><input id="regReferral"></div><button class="btn secondary" style="width:100%">Create Account</button></form></div></div>
